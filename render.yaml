services:
  - type: web
    name: inventory-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: inventory-postgres
    databaseName: inventory_db
    user: inventory_user
    plan: free