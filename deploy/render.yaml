# Render deployment configuration
services:
  - type: web
    name: inventory-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user